# external-agents — per-agent defaults.  One agent per line:
#
#     agent | model | effort
#
#   agent   one of: agy | codex | claude   (the runner knows how to drive each)
#   model   default model id for that cli; leave blank for the cli's default
#   effort  default reasoning effort (blank = cli/model default):
#             claude -> --effort <low|medium|high|xhigh|max>
#             codex  -> -c model_reasoning_effort="<...>"  (e.g. xhigh)
#             agy    -> ignored; the tier is baked into the model name, e.g. "(High)"
#
# Lines starting with # are ignored. Only the agents listed here run under
# `--agent all`; a named `--agent agy|codex|claude` runs even if commented here
# (it just falls back to the cli default model/effort). Per-run --model/--effort
# override these.
#
#   agy models -> Gemini 3.5 Flash (Medium|High|Low), Gemini 3.1 Pro (Low|High),
#                 Claude Opus 4.6 (Thinking), Claude Sonnet 4.6 (Thinking), GPT-OSS 120B (Medium)

agy    | Gemini 3.1 Pro (High) |
codex  | gpt-5.5               | xhigh
# claude | claude-opus-4-8     | xhigh    # uncomment to add Claude to `--agent all`
