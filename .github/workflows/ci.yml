name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # The single required check job is OFFLINE BY DESIGN: shellcheck + the CLI-free
  # tests/run.sh. It must NEVER invoke the opt-in live harness (tests/live-smoke.sh) or
  # the E2E recipes (tests/e2e/), which launch real external agent CLIs (cost + ship the
  # tree to third-party providers). Any live verification belongs in a SEPARATE,
  # non-required, manually / scheduled job — never a step added to this job.
  # These steps mirror the local validation loop in CONTRIBUTING.md — keep the two in sync.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck the driver scripts
        run: shellcheck scripts/run-agent.sh scripts/bump-version.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate agents.json schema
        run: |
          python3 -m pip install --quiet jsonschema
          python3 -c "import json, jsonschema; jsonschema.validate(json.load(open('agents.json')), json.load(open('schema/agents.schema.json')))"

      - name: Validate run-record schema (offline, no live CLI)
        run: |
          python3 -m pip install --quiet jsonschema
          python3 -c "import json, jsonschema; s = json.load(open('schema/run-record.schema.json')); jsonschema.Draft7Validator.check_schema(s); m = {'agent': 'codex', 'model': 'm', 'tier': 'high', 'effort': 'high', 'mode': 'readonly', 'target': '/t', 'rc': 0, 'sec': 1, 'bytes': 10, 'fallback': False, 'timestamp': '2026-06-20T00:00:00Z', 'signals': {'tokens': 'unavailable', 'cost': 'unavailable'}}; jsonschema.validate(m, s); jsonschema.validate(dict(m, run_id='x', project='p'), s); print('run-record schema OK')"

      - name: Run the offline test suite
        run: bash tests/run.sh
