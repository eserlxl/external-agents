name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # The single required check job is OFFLINE BY DESIGN: shellcheck + the CLI-free
  # tests/run.sh. It must NEVER invoke the opt-in live harness (tests/live-smoke.sh),
  # which launches real external agent CLIs (cost + ships the tree to third-party
  # providers). Any live verification belongs in a SEPARATE, non-required, manually /
  # scheduled job — never a step added to this job.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck the driver scripts
        run: shellcheck scripts/run-agent.sh scripts/bump-version.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate agents.json schema
        run: |
          python3 -m pip install --quiet jsonschema
          python3 -c "import json, jsonschema; jsonschema.validate(json.load(open('agents.json')), json.load(open('schema/agents.schema.json')))"

      - name: Run the offline test suite
        run: bash tests/run.sh
